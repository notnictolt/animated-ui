<!DOCTYPE html>
<html>
  <head>
    <title>nic_x.json generator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="left">
      <a href="pages/page2.html">Bottom text generator</a>

      <h3 style="text-align: center">Title Generator</h3>

      <!-- SIZE -->
      <label>Size (x,y)</label>
      <input id="size" placeholder="180,28 or 40%,28" />

      <!-- ANIM -->
      <label>Animation starts from (x,y)</label>
      <input id="anim_from" placeholder="0,-20%" />

      <label>Animation ends to (x,y)</label>
      <input id="anim_to" placeholder="0,0" />

      <!-- ANCHORS -->
      <label>Anchor</label>
      <select id="anchor_from">
        <option>top_middle</option>
        <option>top_left</option>
        <option>top_right</option>
      </select>

      <h3 style="text-align: center">Title Type</h3>

      <select id="title_type">
        <option value="label">Label</option>
        <option value="image">Image</option>
      </select>

      <!-- LABEL OPTIONS -->
      <div id="label_options" class="box">
        <h4 style="text-align: center">Label Settings</h4>
        <h5>Font scale</h5>
        <input id="font_scale" placeholder="4" />
        <select id="text_align">
          <option>left</option>
          <option selected>center</option>
          <option>right</option>
        </select>

        <h4 style="text-align: center">Default State</h4>
        <input id="text_default" placeholder="Text" />
        <input id="color_default" placeholder="1,1,1" />
        <select id="font_default">
          <option>default</option>
          <option>rune</option>
          <option>unicode</option>
          <option selected>smooth</option>
          <option>MinecraftTen</option>
        </select>

        <h4 style="text-align: center">Hover State</h4>
        <input id="text_hover" placeholder="Text" />
        <input id="color_hover" placeholder="1,1,1" />
        <select id="font_hover">
          <option>default</option>
          <option>rune</option>
          <option>unicode</option>
          <option selected>smooth</option>
          <option>MinecraftTen</option>
        </select>
      </div>

      <!-- IMAGE OPTIONS -->
      <div id="image_options" class="box" style="display: none">
        <h4 style="text-align: center">Default Texture</h4>
        <input id="tex_default" placeholder="textures/ui/title" />

        <h4 style="text-align: center">Hover Texture</h4>
        <input id="tex_hover" placeholder="textures/ui/title" />

        <h4 style="text-align: center">Splash text Settings</h4>
        <h5>Ignored</h5>
        <select id="ignored">
          <option>true</option>
          <option>false</option>
        </select>
        <h5>Offset</h5>
        <input id="offset" placeholder="20%,0" />
      </div>

      <button onclick="downloadJSON()">Download JSON</button>
    </div>

    <div class="right">
      <pre id="output"></pre>
    </div>

    <script src="scripts/nic_x.js"></script>
  </body>
</html>
