<!DOCTYPE html>
<html>
  <head>
    <title>Mi | Animated Ui</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../images/favicon-16x16.png"
    />

    <!-- ICO fallback -->
    <link rel="icon" href="../images/favicon.ico" />

    <!-- Apple devices -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../images/apple-touch-icon.png"
    />

    <!-- Android / Chrome -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="../images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <div class="topnav">
      <a href="../index.html">TITLE</a>
      <a href="page3.html">BOTTOM TEXT</a>
      <a href="page4.html">OVERLAY</a>
    </div>
    <div class="main">
      <div class="left">
        <h1 style="text-align: center">Middle panel editor</h1>
        <label>Size (x,y)</label>
        <input id="size" placeholder="120,128" />
        <label>Animation starts from (x,y)</label>
        <input id="anim_from" placeholder="0,20%" />
        <label>Animation ends to (x,y)</label>
        <input id="anim_to" placeholder="0,0" />
        <label>Anchor</label>
        <select id="anchor">
          <option>center</option>
          <option>left_middle</option>
          <option>right_middle</option>
        </select>

        <h3 style="text-align: center">Button Designs</h3>
        <select id="panel_type">
          <option value="label">Label</option>
          <option value="image">Image</option>
        </select>
        <label>Size (x,y)</label>
        <input id="panel_size" placeholder="100%,20" />
        <label>Font Size</label>
        <input id="font_scale" placeholder="1" />
        <label>Font alignment</label>
        <select id="align">
          <option>left</option>
          <option selected>center</option>
          <option>right</option>
        </select>
        <!-- IMAGE ONLY -->
        <div id="image_style">
          <h4>Texture</h4>
          <label>Default texture</label>
          <input
            id="tex_default"
            placeholder="textures/animated_ui/button"
          /><label>Hover texture</label>
          <input id="tex_hover" placeholder="textures/animated_ui/button" />
          <label>Size (x,y)</label>
          <input id="img_size" placeholder="100% - 2px,100% - 2px" />
        </div>
        <!-- DEFAULT -->
        <h4>Default State</h4>
        <label>Font Type</label>
        <select id="font_default">
          <option>default</option>
          <option>rune</option>
          <option>unicode</option>
          <option>smooth</option>
          <option>MinecraftTen</option>
        </select>
        <label>Label color</label>
        <input id="color_default" placeholder="1,1,1" />

        <!-- HOVER -->
        <h4>Hover State</h4>
        <label>Font Type</label>
        <select id="font_hover">
          <option>default</option>
          <option>rune</option>
          <option>unicode</option>
          <option>smooth</option>
          <option>MinecraftTen</option>
        </select>
        <label>Label color</label>
        <input id="color_hover" placeholder="1,1,1" />

        <h3>Buttons</h3>
        <input id="btn_count" type="number" value="2" min="1" max="8" />
        <div id="buttons_container"></div>

        <button onclick="downloadJSON()">Download JSON</button>
      </div>

      <div class="right">
        <pre id="output"></pre>
      </div>
    </div>
    <script src="/scripts/nic_y.js"></script>
  </body>
</html>
